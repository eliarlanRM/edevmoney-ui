<div class="container">
  <div class="container-body">
    <form autocomplete="off">
      <div class="grid">
        <div class="col-12">
          <h1>Nova Pessoa</h1>
        </div>
        <div class="col-12 p-fluid">
          <label>Nome</label>
          <input pInputText type="text" name="nome" required minlength="5">
        </div>
        <div class="col-12 md:col-9 p-fluid">
          <label>Logradouro</label>
          <input pInputText type="text" name="logradouro" required>
        </div>
        <div class="col-12 md:col-3 p-fluid">
          <label>Número</label>
          <input pInputText type="text" name="numero" required>
        </div>
        <div class="col-12 md:col-4 p-fluid">
          <label>Complemento</label>
          <input pInputText type="text" name="complemento">
        </div>
        <div class="col-12 md:col-4 p-fluid">
          <label>Bairro</label>
          <input pInputText type="text" name="bairro" required>
        </div>
        <div class="col-12 md:col-4 p-fluid">
          <label>CEP</label>
          <p-inputMask name="cep" mask="99.999-999" [required]="true"></p-inputMask>
        </div>
        <div class="col-12 md:col-6 p-fluid">
          <label>Cidade</label>
          <input pInputText type="text" name="cidade" required>
        </div>
        <div class="col-12 md:col-6 p-fluid">
          <label>Estado</label>
          <input pInputText type="text" name="estado" required="true">
        </div>
        <div class="col-12">
          <button pButton type="submit" label="Salvar" [disabled]=""></button>
          <button pButton type="button" label="Nova" class="p-button-info"></button>
          <button pButton type="button" [routerLink]="['/pessoas']" label="Voltar para pesquisa" class="p-button-link"></button>
      </div>
      </div>
    </form>
  </div>
</div>
